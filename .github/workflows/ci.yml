name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pipeline tollerante alla fase "base documentale": i passi di lint e test
# vengono eseguiti solo se nel repository sono presenti sorgenti/dipendenze Python.
# Diventerà una pipeline completa appena arriverà lo scaffold del codice.

jobs:
  build:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (se presenti)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          for f in engine backend frontend; do
            if [ -f "$f/requirements.txt" ]; then pip install -r "$f/requirements.txt"; fi
          done
          pip install ruff pytest

      - name: Lint (ruff)
        run: |
          if ls **/*.py >/dev/null 2>&1 || ls *.py >/dev/null 2>&1; then
            ruff check .
            ruff format --check .
          else
            echo "Nessun sorgente Python da analizzare: skip lint (fase base documentale)."
          fi

      - name: Test (pytest)
        run: |
          if [ -d tests ] || ls **/test_*.py >/dev/null 2>&1 || ls **/*_test.py >/dev/null 2>&1; then
            pytest -q
          else
            echo "Nessun test presente: skip test (fase base documentale)."
          fi
