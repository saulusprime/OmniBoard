# Configurazione Alembic del backend.
#
# NON contiene l'URL del database: lo risolve migrations/env.py da
# app.database.DATABASE_URL (variabile d'ambiente DATABASE_URL, caricata anche
# da .env, con default sqlite:///./scacchi.db). Così CLI e avvio dell'app usano
# sempre la stessa fonte di verità.
#
# Uso tipico (dalla directory backend/):
#   ../.venv/bin/alembic upgrade head                        # applica le migrazioni
#   ../.venv/bin/alembic revision --autogenerate -m "..."    # nuova migrazione dai modelli
#
# All'avvio dell'app le migrazioni vengono applicate automaticamente
# (app/db_migrate.py, chiamato dal lifespan di main.py).

[alembic]
# %(here)s = directory di questo file: percorsi indipendenti dalla CWD.
script_location = %(here)s/migrations
prepend_sys_path = %(here)s
path_separator = os
# Etichetta file di migrazione: 0001_..., 0002_... (leggibili e ordinati).
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
